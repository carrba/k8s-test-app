apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: k8s-test-app
  namespace: k8s-test-app
  labels:
    app: k8s-test-app
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
    - k8s-test-app
  selector:
    matchLabels:
      app: k8s-test-app
      metrics: enabled
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
