apiVersion: batch/v1
kind: Job
metadata:
  name: zap-scan
  namespace: k8s-test-app
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      containers:
        - name: zap
          image: ghcr.io/zaproxy/zaproxy:stable
          volumeMounts:
            - name: zap-work
              mountPath: /zap/wrk
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              zap-baseline.py -t http://k8s-test-app.k8s-test-app.svc.cluster.local -I -r /zap/wrk/report.html -w /zap/wrk/report.md
              echo "===== BEGIN ZAP REPORT.MD ====="
              cat /zap/wrk/report.md
              echo "===== END ZAP REPORT.MD ====="
      volumes:
        - name: zap-work
          emptyDir: {}
      restartPolicy: Never
