apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-zap-sa
  namespace: k8s-test-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-actions-zap-role
  namespace: k8s-test-app
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-zap-binding
  namespace: k8s-test-app
subjects:
  - kind: ServiceAccount
    name: github-actions-zap-sa
    namespace: k8s-test-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-actions-zap-role
