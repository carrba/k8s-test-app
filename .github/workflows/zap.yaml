name: Run ZAP Scan
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  zap:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CERT }}" | base64 -d > $HOME/.kube/ca.crt
          kubectl config set-cluster k8s-cluster --server=${{ secrets.KUBE_SERVER }} --certificate-authority=$HOME/.kube/ca.crt
          kubectl config set-credentials user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context default --cluster=k8s-cluster --user=user
          kubectl config use-context default

      - name: Apply ZAP job
        run: |
          kubectl delete job zap-scan -n k8s-test-app --ignore-not-found
          kubectl apply -f k8s/zapjob.yaml

      - name: Copy ZAP report from pod
        run: |
          until pod=$(kubectl get pods -n ${{ secrets.KUBE_NAMESPACE }} -l job-name=zap-scan -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | head -n1) && [ -n "$pod" ]; do
            echo "Waiting for zap-scan pod..."
            sleep 2
          done
          echo "Found pod: $pod"
          until [ "$(kubectl get pod -n ${{ secrets.KUBE_NAMESPACE }} "$pod" -o jsonpath='{.status.phase}')" = "Running" ]; do
            echo "Waiting for pod to be Running..."
            sleep 2
          done
          echo "Pod is Running, waiting for report to be written..."
          until kubectl exec -n ${{ secrets.KUBE_NAMESPACE }} "$pod" -- test -s /zap/wrk/report.html; do
            echo "report.html not ready yet..."
            sleep 2
          done
          kubectl cp "${{ secrets.KUBE_NAMESPACE }}/$pod:/zap/wrk/report.html" ./report.html
          test -s ./report.html

      - name: Wait for job completion
        run: |
          kubectl wait \
            --for=condition=complete \
            job/zap-scan \
            -n ${{ secrets.KUBE_NAMESPACE }} \
            --timeout=900s

      - name: Get logs (debugging)
        run: |
          kubectl logs job/zap-scan -n ${{ secrets.KUBE_NAMESPACE }} | tee zap-output.txt

      - name: Upload ZAP scan report artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: zap-scan-report
          path: |
            report.html
            zap-output.txt

      - name: Parse ZAP alerts
        id: parse_alerts
        shell: bash
        run: |
          FAIL_COUNT=$(grep -oE 'FAIL-NEW: [0-9]+' zap-output.txt | tail -1 | awk '{print $2}')
          WARN_COUNT=$(grep -oE 'WARN-NEW: [0-9]+' zap-output.txt | tail -1 | awk '{print $2}')

          FAIL_COUNT=${FAIL_COUNT:-0}
          WARN_COUNT=${WARN_COUNT:-0}

          echo "fail_count=${FAIL_COUNT}" >> "$GITHUB_OUTPUT"
          echo "warn_count=${WARN_COUNT}" >> "$GITHUB_OUTPUT"

          {
            echo "# ZAP Scan Alerts"
            echo
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- FAIL-NEW: ${FAIL_COUNT}"
            echo "- WARN-NEW: ${WARN_COUNT}"
            echo
            echo "## ZAP Output Excerpt"
            echo
            echo '```text'
            tail -n 120 zap-output.txt
            echo '```'
          } > zap-issue.md
