name: Run ZAP Scan
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  zap:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CERT }}" | base64 -d > $HOME/.kube/ca.crt
          kubectl config set-cluster k8s-cluster --server=${{ secrets.KUBE_SERVER }} --certificate-authority=$HOME/.kube/ca.crt
          kubectl config set-credentials user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context default --cluster=k8s-cluster --user=user
          kubectl config use-context default

      - name: Apply ZAP job
        run: |
          kubectl delete job zap-scan -n k8s-test-app --ignore-not-found
          kubectl apply -f k8s/zapjob.yaml

      - name: Wait for job completion
        run: |
          kubectl wait \
            --for=condition=complete \
            job/zap-scan \
            -n ${{ secrets.KUBE_NAMESPACE }} \
            --timeout=900s

      - name: Get logs (debugging)
        run: |
          kubectl logs job/zap-scan -n ${{ secrets.KUBE_NAMESPACE }} | tee zap-output.txt

      - name: Extract report.md from logs
        shell: bash
        run: |
          awk '/^===== BEGIN ZAP REPORT\.MD =====$/ {capture=1; next} /^===== END ZAP REPORT\.MD =====$/ {capture=0; exit} capture {print}' zap-output.txt > report.md
          test -s report.md

      - name: Print report.md to stdout
        run: |
          echo "===== BEGIN ZAP report.md ====="
          cat report.md
          echo "===== END ZAP report.md ====="

      - name: Upload ZAP scan report artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: zap-scan-report
          path: |
            report.md
            zap-output.txt

      - name: Parse summary
        run: |
          #!/bin/bash -xe
          
          # Read directly from the markdown file.
          # -m 1 ensures we only grab the first match (which is the summary table at the top of the report)
          high_value=$(grep -a -m 1 "| High |" report.md | awk -F'|' '{print $3}' | xargs)
          medium_value=$(grep -a -m 1 "| Medium |" report.md | awk -F'|' '{print $3}' | xargs)
          low_value=$(grep -a -m 1 "| Low |" report.md | awk -F'|' '{print $3}' | xargs)
          info_value=$(grep -a -m 1 "| Informational |" report.md | awk -F'|' '{print $3}' | xargs)
          
          # Fallback to 0 if grep returns empty (e.g., if the ZAP report is totally empty/failed)
          high_value=${high_value:-0}
          medium_value=${medium_value:-0}
          low_value=${low_value:-0}
          info_value=${info_value:-0}

          echo "ZAP_HIGH=${high_value}" >> "$GITHUB_ENV"
          echo "ZAP_MEDIUM=${medium_value}" >> "$GITHUB_ENV"
          echo "ZAP_LOW=${low_value}" >> "$GITHUB_ENV"
          echo "ZAP_INFO=${info_value}" >> "$GITHUB_ENV"

          if [[ $high_value -gt 0 ]]; then
              echo "High alerts, notification should be sent"
              echo "ZAP_SHOULD_NOTIFY=true" >> "$GITHUB_ENV"
          elif [[ $medium_value -gt 0 || $low_value -gt 0 ]]; then
              # For daily baseline runs, send summary on Wednesday if there are med/low
              if [ "$(date +%A)" = "Wednesday" ]; then
                  echo "Medium and/or low alerts on Wednesday, notification should be sent"
                  echo "ZAP_SHOULD_NOTIFY=true" >> "$GITHUB_ENV"
              else
                  echo "ZAP_SHOULD_NOTIFY=false" >> "$GITHUB_ENV"
              fi
          else
              echo "ZAP_SHOULD_NOTIFY=false" >> "$GITHUB_ENV"
          fi


