name: Run ZAP Scan
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  zap:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build scan target
        run: |
          docker build -t k8s-test-app:zap .

      - name: Start scan target
        run: |
          docker network create zap-scan
          docker run -d --name k8s-test-app --network zap-scan -p 5000:5000 k8s-test-app:zap

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "The app did not become healthy on http://127.0.0.1:5000 within 60 seconds."
          docker logs k8s-test-app
          exit 1

      - name: Run ZAP baseline scan
        run: |
          mkdir -p "$RUNNER_TEMP/zap-report"
          mkdir -p "$RUNNER_TEMP/zap-home"

          docker run --rm \
            --user root \
            --network zap-scan \
            -v "$RUNNER_TEMP/zap-report:/zap/wrk:rw" \
            -v "$RUNNER_TEMP/zap-home:/home/zap:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            /bin/sh -c 'cd /zap/wrk && zap-baseline.py -t http://k8s-test-app:5000 -I -w report.md && echo "===== BEGIN ZAP REPORT.MD =====" && cat report.md && echo "===== END ZAP REPORT.MD ====="' | tee zap-output.txt

          cp "$RUNNER_TEMP/zap-report/report.md" report.md

      - name: Verify report output
        run: |
          test -s report.md

      - name: Clean up scan target
        if: always()
        run: |
          docker rm -f k8s-test-app || true
          docker network rm zap-scan || true
          rm -rf "$RUNNER_TEMP/zap-report"
          rm -rf "$RUNNER_TEMP/zap-home"

      - name: Print report.md to stdout
        run: |
          echo "===== BEGIN ZAP report.md ====="
          cat report.md
          echo "===== END ZAP report.md ====="

      - name: Upload ZAP scan report artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: zap-scan-report
          path: |
            report.md
            zap-output.txt

      - name: Parse summary
        run: |
          #!/bin/bash -xe
          
          # Read directly from the markdown file.
          # -m 1 ensures we only grab the first match (which is the summary table at the top of the report)
          high_value=$(grep -a -m 1 "| High |" report.md | awk -F'|' '{print $3}' | xargs)
          medium_value=$(grep -a -m 1 "| Medium |" report.md | awk -F'|' '{print $3}' | xargs)
          low_value=$(grep -a -m 1 "| Low |" report.md | awk -F'|' '{print $3}' | xargs)
          info_value=$(grep -a -m 1 "| Informational |" report.md | awk -F'|' '{print $3}' | xargs)
          
          # Fallback to 0 if grep returns empty (e.g., if the ZAP report is totally empty/failed)
          high_value=${high_value:-0}
          medium_value=${medium_value:-0}
          low_value=${low_value:-0}
          info_value=${info_value:-0}

          echo "ZAP_HIGH=${high_value}" >> "$GITHUB_ENV"
          echo "ZAP_MEDIUM=${medium_value}" >> "$GITHUB_ENV"
          echo "ZAP_LOW=${low_value}" >> "$GITHUB_ENV"
          echo "ZAP_INFO=${info_value}" >> "$GITHUB_ENV"

          if [[ $high_value -gt 0 ]]; then
              echo "High alerts, notification should be sent"
              echo "ZAP_SHOULD_NOTIFY=true" >> "$GITHUB_ENV"
          elif [[ $medium_value -gt 0 || $low_value -gt 0 ]]; then
              # For daily baseline runs, send summary on Wednesday if there are med/low
              if [ "$(date +%A)" = "Wednesday" ]; then
                  echo "Medium and/or low alerts on Wednesday, notification should be sent"
                  echo "ZAP_SHOULD_NOTIFY=true" >> "$GITHUB_ENV"
              else
                  echo "ZAP_SHOULD_NOTIFY=false" >> "$GITHUB_ENV"
              fi
          else
              echo "ZAP_SHOULD_NOTIFY=false" >> "$GITHUB_ENV"
          fi
