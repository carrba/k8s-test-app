name: Build and Push to ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: k8s-test-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Derive image tags
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        shell: bash
        run: |
          docker build -t "${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}" .

      - name: Tag image for ECR
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag "${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}" "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}"
          docker tag "${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}" "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"

      - name: Push image to ECR
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}"
          docker push "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"

      - name: Output image URI
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Pushed image: ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.short_sha }}"
          echo "Pushed image: ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"
